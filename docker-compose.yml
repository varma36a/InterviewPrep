version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AppDb: Host=db;Port=5432;Database=saas_platform;Username=postgres;Password=postgres
      OpenTelemetry__Endpoint: http://otel-collector:4317
    depends_on:
      - db
      - otel-collector

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  otel-collector:
    image: otel/opentelemetry-collector:0.104.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./ops/otel-collector.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"

volumes:
  postgres_data:
